runners:
  - name: custom-command
    type: custom-command
    command: >
      node -e "const fs=require('node:fs'); fs.mkdirSync('graph',{recursive:true}); fs.mkdirSync('articles/001',{recursive:true}); fs.writeFileSync('index.html','<main><h1>Basic demo</h1><a href=\"graph/\">Graph</a><a href=\"articles/\">Articles</a></main>'); fs.writeFileSync('graph/index.html','<h1>Graph</h1><p>demo-founder founded demo-product</p>'); fs.writeFileSync('articles/index.html','<h1>Articles</h1><a href=\"001/\">Example article</a>'); fs.writeFileSync('articles/001/index.html','<article><h1>Example article</h1><p>This is a tiny template output.</p></article>'); fs.writeFileSync('README.md','Basic demo output for {model.name} {round.id}\n'); fs.writeFileSync('VERIFICATION.md','Generated by custom-command runner.\n'); console.log('wrote basic demo for {model.name} {round.id}')"
    timeout_minutes: 5
    retries: 0
