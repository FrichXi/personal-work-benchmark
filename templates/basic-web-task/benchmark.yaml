task:
  id: basic-web-task
  title: Basic web task
  description: >
    Replace this with a real task from your own work. Keep the input, prompt,
    output requirements, and scoring dimensions stable across all model runs.
  rounds: 2

inputs:
  fixture: fixtures
  prompt: task-prompt.md

outputs:
  root: runs/{task}/{runner}/{model}/{round}
  required_paths:
    - /
    - /graph/
    - /articles/
    - /articles/001/

scoring:
  total: 100
  dimensions:
    - id: loading
      label: Loading
      points: 20
      source: loading
    - id: graph
      label: Graph
      points: 25
      source: graph
    - id: articles
      label: Articles
      points: 25
      source: articles
    - id: visual
      label: Visual
      points: 15
      source: visual
    - id: interaction
      label: Interaction
      points: 15
      source: interaction

evidence:
  required:
    - artifact-specific evidence sentence
    - route status
    - graph or domain-specific completion signal
    - sampled detail result
  screenshots:
    - home
    - graph

claims:
  allowed: Only describe performance on this specific personal task.
  forbidden: Do not present these scores as general model rankings.
